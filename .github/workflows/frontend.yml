name: Frontend CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  frontend:
    name: Lint, Build, and Dockerize Frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: juris-assist-ui

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Node 20 matches the frontend Dockerfile build stage.
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: juris-assist-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Build React application
        run: npm run build

      # Validates the production frontend Dockerfile from juris-assist-ui/Dockerfile.
      - name: Build frontend Docker image
        run: docker build -t jurist-frontend .

