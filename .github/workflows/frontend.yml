name: Frontend CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  frontend:
    name: Lint, Build, and Dockerize Frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: juris-assist-ui

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Node 20 matches the frontend Dockerfile build stage.
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: juris-assist-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Build React application
        run: npm run build

      - name: Build frontend Docker image
        run: docker build -t jurist-frontend .

      - name: Login to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Push frontend image
        if: github.event_name == 'push'
        run: |
          docker tag jurist-frontend ${{ secrets.DOCKER_USERNAME }}/jurist-frontend:latest
          docker tag jurist-frontend ${{ secrets.DOCKER_USERNAME }}/jurist-frontend:${{ github.sha }}

          docker push ${{ secrets.DOCKER_USERNAME }}/jurist-frontend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/jurist-frontend:${{ github.sha }}